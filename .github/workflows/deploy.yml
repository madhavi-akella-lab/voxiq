name: Deploy VoxIQ

on:
  push:
    branches: [main]

jobs:
  deploy-infrastructure:
    name: Deploy AWS Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CDK globally
        run: npm install -g aws-cdk@latest

      - name: Install CDK Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: infrastructure

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: CDK Bootstrap
        run: cdk bootstrap aws://198376985950/us-east-1
        working-directory: infrastructure

      - name: CDK Deploy
        run: cdk deploy --require-approval never
        working-directory: infrastructure

  deploy-frontend:
    name: Build and Deploy React Dashboard
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          aws s3 sync frontend/dist/ s3://voxiq-frontend-$ACCOUNT --delete
